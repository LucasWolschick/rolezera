name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
          podman login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Build image
        run: |
          podman build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/rolezera:latest .

      - name: Push image
        run: |
          podman push ghcr.io/${{ secrets.GHCR_USERNAME }}/rolezera:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            podman pull ghcr.io/${{ secrets.GHCR_USERNAME }}/rolezera:latest
            podman stop rails || true
            podman rm rails || true
            podman run -d \
              --name rails \
              -p 3000:3000 \
              --env-file ~/.rails-env \
              ghcr.io/${{ secrets.GHCR_USERNAME }}/rolezera:latest
